services:
  - type: web
    name: orbi-sovereign-node
    env: node
    plan: starter
    region: ohio
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: "https://orbi-financial-technologies-c0re-v2026.onrender.com"
      - key: RP_ID
        value: "orbi-financial-technologies-c0re-v2026.onrender.com"
      - key: ORBI_WEB_ORIGIN
        value: "https://orbi-financial-technologies-c0re-v2026.onrender.com"
      - key: ORIGIN
        value: "https://orbi-financial-technologies-c0re-v2026.onrender.com"
      - key: ORBI_MOBILE_ORIGIN
        value: "ORBI_MOBILE_V2026"
      - key: ORBI_MOBILE_APP_ID
        value: "mobile-android"
      - key: ORBI_IOS_BUNDLE_IDS
        value: "com.orbi.mobile"
      - key: ORBI_IOS_TEAM_ID
        sync: false
      - key: ORBI_CORE_PORTAL_APP_ORIGIN
        value: "ORBI-NODE-PORTAL-V2026"
      - key: ORBI_CORE_PORTAL_APP_ID
        value: "ORBI_NODE_PORTAL_V2026"
      - key: ORBI_CORE_APP_ORIGIN
        value: "ORBI-NODE-APPS-V2026"
      - key: ORBI_CORE_APP_ID
        value: "ORBI_NODE_APPS_V2026"
      - key: ORBI_INSTITUTIONAL_APP_ID
        value: "ORBI_INSTITUTIONAL_CORE_V2026"
      - key: ORBI_INSTITUTIONAL_APP_ORIGIN
        value: "ORBI_INSTITUTIONAL_CORE_V2026"
      - key: ORBI_ANDROID_PACKAGE_NAME
        value: "com.orbi.mobile"
      - key: ORBI_ANDROID_APP_HASH
        sync: false
      - key: APP_ID
        value: "ORBI_INSTITUTIONAL_CORE_V2026"
      - key: JWT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: WORKER_SECRET
        sync: false
      - key: WORKER_SIGNING_SECRET
        sync: false
      - key: KMS_MASTER_KEY
        sync: false
      - key: KMS_SALT
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ORBI_INTERNAL_MTLS_MODE
        value: "required"
      - key: ORBI_INTERNAL_MTLS_SOURCE
        value: "proxy"
      - key: ORBI_INTERNAL_MTLS_PROXY_HEADER
        value: "x-orbi-mtls-attested"
      - key: ORBI_INTERNAL_MTLS_PROXY_SHARED_SECRET
        sync: false
      - key: ORBI_ENFORCE_HTTPS
        value: "true"
      - key: ORBI_TLS_ENABLED
        value: "false"
      - key: ORBI_ALLOWED_ORIGINS
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        value: "redis://red-d6ubkhs50q8c73fumq4g:6379"
      - key: KYC_BUCKET
        sync: false
